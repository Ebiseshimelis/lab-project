<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2 class="form-title">Login Form</h2>
        
        <form id="loginForm" action="handle_login.php" method="POST">
            <div class="form-group">
                <label for="loginUser">Username or Email</label>
                <input type="text" name="user_email" id="loginUser" required>
            </div>
            <div class="form-group">
                <label for="loginPass">Password</label>
                <input type="password" name="password" id="loginPass" required>
            </div>
            <div class="btn-container">
                <button type="submit" class="btn btn-blue">Login</button>
                <button type="reset" class="btn btn-red">Clear</button>
            </div>
            <div style="text-align:center; margin-top: 16px;">
                <a href="registration.html" style="text-decoration: underline; color: #007bff; cursor: pointer;">Create new account</a>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
